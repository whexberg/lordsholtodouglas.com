# Air configuration for live reloading
# https://github.com/air-verse/air

root = "."
tmp_dir = "tmp"

[build]
  # Build command
  cmd = "templ generate && ./bin/tailwindcss -i static/input.css -o static/style.css --minify && go build -o ./tmp/server ./cmd/server"
  # Binary to run
  bin = "./tmp/server"
  # Watch these extensions
  include_ext = ["go", "tpl", "tmpl", "templ", "html", "css", "js", "md"]
  # Watch content directory for markdown changes
  include_dir = ["cmd", "internal", "templates", "static", "content"]
  # Exclude directories
  exclude_dir = ["assets", "tmp", "vendor", "node_modules", ".git", "caddy"]
  # Exclude files
  exclude_file = []
  # Exclude regex patterns
  exclude_regex = ["_test.go", "_templ.go"]
  # Exclude unchanged files
  exclude_unchanged = false
  # Follow symlinks
  follow_symlink = false
  # Delay before rebuilding (ms)
  delay = 500
  # Stop old binary on build error
  stop_on_error = true
  # Send interrupt signal before kill
  send_interrupt = true
  # Delay before sending kill signal (ms)
  kill_delay = 500

[log]
  # Log time
  time = false
  # Main log only
  main_only = false

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  # Delete tmp dir on exit
  clean_on_exit = true

[screen]
  # Clear screen on rebuild
  clear_on_rebuild = true
  # Keep scroll position
  keep_scroll = true
