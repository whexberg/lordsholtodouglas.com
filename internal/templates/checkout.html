<!doctype html>
<html>

<head>
    <title>Checkout</title>
    <script src="https://web.clover.com/sdk.js"></script>
</head>

<body>
    <h1>Checkout</h1>

    <div id="clover-container"></div>

    <button id="checkout-button">Pay Now</button>

    <script>
        // Initialize Clover with your Public Key
        const publicKey = "YOUR_CLOVER_PUBLIC_KEY";

        const clover = new Clover({
            publicKey: publicKey,
            merchantId: "YOUR_MERCHANT_ID",
        });

        const elements = clover.elements();
        const cardElement = elements.create("card");
        cardElement.mount("#clover-container");

        document
            .getElementById("checkout-button")
            .addEventListener("click", async () => {
                const { token, error } = await clover.tokenize(cardElement);

                if (error) {
                    console.error("Tokenization error:", error);
                    return;
                }

                // Send token to your backend
                const response = await fetch("/api/checkout", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        amount: 2999, // $29.99 in cents
                        token: token,
                    }),
                });

                const result = await response.json();
                if (result.status === "success") {
                    alert("Payment successful! Transaction ID: " + result.id);
                } else {
                    alert("Payment failed");
                }
            });
    </script>
</body>

</html>
