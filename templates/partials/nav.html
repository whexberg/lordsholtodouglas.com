{{define "nav"}}
<nav class="bg-background mb-1 font-serif border-b shadow-md fixed w-full z-50">
    <div class="mx-auto max-w-7xl py-4">

            <a href="/" class="cursor-pointer">

            </a>

            <div class="hidden space-x-4 text-sm font-bold tracking-wide uppercase lg:flex items-center">
                <a class="hover:text-primary group relative block py-2 tracking-widest uppercase" href="/">
                    <span>Home</span>
                    <span class="absolute bottom-1 left-0 hidden h-0.5 w-0 bg-current transition-all duration-300 ease-in-out group-hover:w-full lg:block"></span>
                </a>
                <a class="hover:text-primary group relative block py-2 tracking-widest uppercase" href="/board-members">
                    <span>The Board</span>
                    <span class="absolute bottom-1 left-0 hidden h-0.5 w-0 bg-current transition-all duration-300 ease-in-out group-hover:w-full lg:block"></span>
                </a>
                <a class="hover:text-primary group relative block py-2 tracking-widest uppercase" href="/events">

                    <span class="absolute bottom-1 left-0 hidden h-0.5 w-0 bg-current transition-all duration-300 ease-in-out group-hover:w-full lg:block"></span>

                </a>

                    <svg class="theme-icon-moon w-5 h-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
                        <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
                    </svg>
                </button>
                <button class="hover:text-primary focus:outline-none" id="mobile-menu-toggle">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" viewBox="0 0 24 24">
                        <path d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Mobile Menu -->

        <a class="hover:bg-primary hover:text-primary-foreground group relative block p-4 py-2 tracking-widest uppercase" href="/">Home</a>
        <a class="hover:bg-primary hover:text-primary-foreground group relative block p-4 py-2 tracking-widest uppercase" href="/board-members">The Board</a>
        <a class="hover:bg-primary hover:text-primary-foreground group relative block p-4 py-2 tracking-widest uppercase" href="/events">Events</a>
        <a class="hover:bg-primary hover:text-primary-foreground group relative block p-4 py-2 tracking-widest uppercase" href="/humbuggery">Hall of Humbuggery</a>
        <a class="hover:bg-primary hover:text-primary-foreground group relative block p-4 py-2 tracking-widest uppercase" href="/history-reports">History Reports</a>
        <a class="hover:bg-primary hover:text-primary-foreground group relative block p-4 py-2 tracking-widest uppercase" href="/shop">Shop</a>
        <button class="hover:bg-primary hover:text-primary-foreground group relative block p-4 py-2 tracking-widest uppercase w-full text-left cursor-pointer" id="nav-cart-mobile">Cart<span id="nav-cart-mobile-count">{{if and .CartCount (gt .CartCount 0)}} ({{.CartCount}}){{end}}</span></button>
