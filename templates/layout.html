<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}Lord Sholto Douglas #3{{end}}</title>
    <meta name="description" content="Lord Sholto Douglas Chapter #3 — E Clampus Vitus. A fraternal organization dedicated to the preservation of Western heritage.">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IM+Fell+DW+Pica&family=Special+Elite&display=swap">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap">
    <script src="/static/theme.js"></script>
    <link rel="stylesheet" href="/static/style.css">
    {{block "head" .}}{{end}}
</head>
<body class="flex flex-col min-h-screen bg-background text-foreground transition-colors duration-200 leading-relaxed text-base">
    {{template "nav" .}}

    <main class="grow flex flex-col w-full pt-28">
        {{block "content" .}}{{end}}
    </main>

    <!-- Cart Drawer Backdrop -->
    <div id="cart-backdrop" class="fixed inset-0 bg-black/50 z-[60] hidden"></div>

    <!-- Cart Drawer -->
    <div id="cart-drawer" class="fixed top-0 right-0 h-full w-full sm:w-96 bg-background border-l border-foreground/20 shadow-2xl z-[70] translate-x-full transition-transform duration-300 ease-in-out flex flex-col">
        <!-- Header -->
        <div class="flex items-center justify-between p-4 border-b border-foreground/20">
            <h2 class="font-serif text-xl font-bold tracking-wide uppercase">Your Cart</h2>
            <button id="cart-close" class="p-2 hover:text-primary transition-colors" aria-label="Close cart">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Body (scrollable) -->
        <div id="cart-items" class="grow overflow-y-auto p-4">
            <p class="text-muted-foreground text-center py-8">Loading...</p>
        </div>

        <!-- Footer -->
        <div id="cart-footer" class="border-t border-foreground/20 p-4 hidden">
            <div class="flex justify-between items-center mb-1">
                <span class="font-serif font-bold text-lg">Total:</span>
                <span id="cart-total" class="font-serif font-bold text-lg"></span>
            </div>
            <p class="text-xs text-muted-foreground mb-4">+ $1.00 processing fee at checkout</p>
            <a href="/checkout" class="block w-full py-3 px-8 bg-primary text-primary-foreground font-display uppercase tracking-widest border-2 border-primary hover:bg-background hover:text-primary transition-all duration-300 text-sm text-center">
                Proceed to Checkout
            </a>
        </div>
    </div>

    {{template "footer" .}}

    <script src="/static/app.js"></script>
    {{block "scripts" .}}{{end}}
</body>
</html>
