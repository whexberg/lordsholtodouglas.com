{{define "title"}}{{.Title}} — Lord Sholto Douglas #3{{end}}
{{define "content"}}

<article class="max-w-4xl mx-auto px-4 py-18 md:px-16">
    <header class="flex flex-col mb-8 gap-2 text-center">
        <h1 class="font-serif text-4xl font-bold tracking-wide drop-shadow-lg md:text-6xl">{{.Title}}</h1>

        {{if .Description}}
        <p class="text-md text-muted-foreground italic">{{.Description}}</p>
        {{end}}
    </header>

    <div class="content flex flex-col gap-2">
        {{.ContentHTML}}
    </div>
</article>

{{end}}
