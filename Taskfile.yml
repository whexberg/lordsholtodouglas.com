version: "3"

vars:
  BINARY: server
  DOCKER_IMAGE: lsd3
  TAILWIND_VERSION: v4.1.8

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  # Tailwind CSS
  tailwind:install:
    desc: Download Tailwind CSS standalone CLI
    cmds:
      - mkdir -p bin
      - curl -sLO https://github.com/tailwindlabs/tailwindcss/releases/download/{{.TAILWIND_VERSION}}/tailwindcss-linux-x64
      - chmod +x tailwindcss-linux-x64
      - mv tailwindcss-linux-x64 bin/tailwindcss
    status:
      - test -x bin/tailwindcss

  templ:generate:
    desc: Generate Go code from templ templates
    cmds:
      - templ generate

  css:build:
    desc: Build CSS with Tailwind
    deps: [tailwind:install, templ:generate]
    cmds:
      - ./bin/tailwindcss -i static/input.css -o static/style.css --minify

  css:watch:
    desc: Watch and rebuild CSS with Tailwind
    deps: [tailwind:install]
    cmds:
      - ./bin/tailwindcss -i static/input.css -o static/style.css --watch

  # Development
  dev:
    desc: Run with hot reload (air + tailwind watch)
    deps: [tailwind:install]
    cmds:
      - templ generate
      - ./bin/tailwindcss -i static/input.css -o static/style.css --watch &
      - air
    env:
      PORT: 8080

  run:
    desc: Run the application locally
    deps: [css:build]
    cmds:
      - go run ./cmd/server
    env:
      PORT: 8080

  build:
    desc: Build the binary
    deps: [css:build]
    cmds:
      - mkdir -p build
      - go build -o build/{{.BINARY}} ./cmd/server

  db:reset:
    desc: Reset the SQLite cart database (handles root-owned files from Docker)
    cmds:
      - sudo rm -rf data
      - mkdir -p data

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf build/
      - rm -rf tmp/
      - rm -rf bin/
      - rm -f static/style.css
      - find templates -name '*_templ.go' -delete
      - go clean

  test:
    desc: Run tests
    cmds:
      - go test -v ./...

  test:cover:
    desc: Run tests with coverage
    cmds:
      - go test -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  # Docker (dev) — hot reload with Caddy
  docker:up:
    desc: Start dev Docker environment (hot reload + Caddy)
    dir: deploy
    cmds:
      - docker compose up --build

  docker:up:detach:
    desc: Start dev Docker environment in background
    dir: deploy
    cmds:
      - docker compose up --build -d

  docker:down:
    desc: Stop dev Docker environment
    dir: deploy
    cmds:
      - docker compose down

  docker:logs:
    desc: View dev Docker logs
    dir: deploy
    cmds:
      - docker compose logs -f

  docker:restart:
    desc: Restart dev Docker environment
    cmds:
      - task: docker:down
      - task: docker:up:detach

  # Docker (prod) — compiled binary with Caddy + TLS
  prod:up:
    desc: Start production Docker environment
    dir: deploy
    cmds:
      - docker compose -f docker-compose.prod.yml up --build -d

  prod:down:
    desc: Stop production Docker environment
    dir: deploy
    cmds:
      - docker compose -f docker-compose.prod.yml down

  prod:logs:
    desc: View production Docker logs
    dir: deploy
    cmds:
      - docker compose -f docker-compose.prod.yml logs -f

  prod:restart:
    desc: Restart production Docker environment
    cmds:
      - task: prod:down
      - task: prod:up

  # Setup
  setup:
    desc: Initial project setup
    cmds:
      - cp -n .env.example .env || true
      - go mod download
      - task tailwind:install
      - task css:build
      - echo "Setup complete. Edit .env with your Clover credentials."

  # Utilities
  env:check:
    desc: Check required environment variables
    cmds:
      - |
        missing=""
        [ -z "$CLOVER_BASE_URL" ] && missing="$missing CLOVER_BASE_URL"
        [ -z "$CLOVER_MERCHANT_ID" ] && missing="$missing CLOVER_MERCHANT_ID"
        [ -z "$CLOVER_PUBLIC_API_TOKEN" ] && missing="$missing CLOVER_PUBLIC_API_TOKEN"
        [ -z "$CLOVER_PRIVATE_API_TOKEN" ] && missing="$missing CLOVER_PRIVATE_API_TOKEN"
        if [ -n "$missing" ]; then
          echo "Missing required env vars:$missing"
          exit 1
        fi
        echo "All required environment variables are set"
