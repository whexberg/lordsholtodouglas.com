services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dev
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - PORT=8080
    volumes:
      - ..:/app
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.dev:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      app:
        condition: service_healthy

networks:
  internal:

volumes:
  caddy_data:
  caddy_config:
