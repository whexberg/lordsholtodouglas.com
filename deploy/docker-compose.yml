services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    environment:
      - PORT=8080
      - CLOVER_API_KEY=${CLOVER_API_KEY}
      - CLOVER_MERCHANT_ID=${CLOVER_MERCHANT_ID}
      - CLOVER_ENVIRONMENT=${CLOVER_ENVIRONMENT:-sandbox}
      - CLOVER_WEBHOOK_SECRET=${CLOVER_WEBHOOK_SECRET}
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080/",
        ]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./local.Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - internal
    depends_on:
      app:
        condition: service_healthy

networks:
  internal:

volumes:
  caddy_data:
  caddy_config:
